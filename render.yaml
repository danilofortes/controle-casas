services:
  - type: web
    name: controle-casas-api
    runtime: python
    plan: free
    rootDir: backend
    region: oregon
    healthCheckPath: /api/health
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.4"
      # Defina os valores abaixo no painel do Render (Environment) — NÃO comite segredos.
      - key: DATABASE_URL
        sync: false
      - key: APP_SENHA
        sync: false
      - key: APP_SESSION_SECRET
        sync: false
      - key: APP_CORS_ORIGINS
        value: "*"
